<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C'Smiles Dental Center - Log In</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #b7e4d9 0%, #fefbe0 100%);
            --form-bg: linear-gradient(180deg, #93d3cc 0%, #689994 100%);
            --input-white: #ffffff;
            --link-blue: #0066ff;
            --button-teal: #1cb9d0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: var(--form-bg);
            width: 400px;
            padding: 50px 40px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo-container {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo-container img {
            width: 90%;
            height: auto;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: none;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            color: #333;
        }

        input::placeholder {
            color: #999;
        }

        .forgot-password {
            display: block;
            text-align: right;
            color: var(--link-blue);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: -10px;
            margin-bottom: 30px;
            padding-right: 10px;
        }

        .login-btn {
            background: var(--button-teal);
            color: black;
            border: none;
            padding: 12px 50px;
            border-radius: 30px;
            font-size: 1.4rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .login-btn:hover {
            filter: brightness(1.1);
            transform: scale(1.05);
        }

        .footer-links {
            margin-top: 40px;
            font-size: 0.95rem;
            color: #444;
        }

        .footer-links a {
            color: var(--link-blue);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="logo.jpg" alt="C'Smiles Logo">
        </div>

        <form id="loginForm">
            
            
			
			
			<div class="input-group">
                <input type="name" placeholder="Name" required>
            </div>
			
			<div class="input-group">
                <input type="number" placeholder="Age" required>
            </div>
			
			<div class="input-group">
                <input type="tel" placeholder="Contact Number" required>
            </div>
			
			<div class="input-group">
                <input type="address" placeholder="Address" required>
            </div>
			<div class="input-group">
                <input type="email" placeholder="Email" required>
            </div>
			
			
            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>
			<div class="input-group">
                <input type="password" placeholder="Confirm Password" required>
            </div>
			

            

            <button type="submit" class="login-btn">Sign Up</button>
        </form>

        <div class="footer-links">
            Already have an account? <a href="login.html">Log In</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Redirect to index.html upon submission
            window.location.href = 'accsuccess.html';
        });
    </script>

</body>
</html>
